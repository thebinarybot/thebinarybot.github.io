[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = false
    noClasses = true
    style = "dracula"
    tabWidth = 4

[params]
  mainSectionTitle = "~/~"
  colortheme = "classic" # dark, light, white, or classic
  # rss = true # generate rss feed. default value is false
  googleAnalyticsAsync = true # use asynchronous tracking. Synchronous tracking by default
  showAllPostsArchive = false # default

  # Home page settings
  description = "Hello, this is Nithin and I go by the handle @thebinarybot in most of the places online. Welcome to my personal website. This website is digital document of everything I do online. Currenrly, I manage two blogs and I write on topics such as Productivity, Decision Making, Books on my Personal Blog and Cybersecurity/Web 3 on my Technical Blog, which is basically a GitBook. If you like my work, consider subscribing to the FREE newsletter on my Personal Blog and get my articles delivered straight to your inbox. I mostly post technical content on Twitter. If you're a security geek, you might as well want to follow me there. To know more about me, visit the About page. Cheers :)"
  # mainSection = "posts" # your main section
  # showAllPostsOnHomePage = false # default
  # postsOnHomePage = 5 # this option will be ignored if showAllPostsOnHomePage is set to true
  # tagsOverview = true # show tags overview by default.
  # showProjectsList = true # show projects list by default (if projects data file exists).
  # projectsUrl = "https://github.com/gohugoio" # title link for projects list

  # https://gohugo.io/functions/format/#hugo-date-and-time-templating-reference
  dateFormat = "2006-01-02" # default

  # Post page settings
  show_updated = true # default
  showReadTime = true # default

  [params.comments]
    enabled = false # default
    engine = "cactus_comments" # only disqus, utterances, and cactus_comments is supported
    [params.comments.utterances]
      repo = "<github_username>/<github_reponame>"
      label = "hugo-site-name" # you can use however you want to label your name in your repo's issues
      theme = "github-light"
    [params.comments.cactuscomments]
      siteName = "your_cactus_comments_sitename" # see https://cactus.chat/ on how to register your site name
      #serverUrl = "" # Defaults to https://matrix.cactus.chat:8448 (Cactus Chat public server)
      #serverName = "" # Defaults to cactus.chat

  # the value of name should be an valid font awesome icon name (brands type)
  # https://fontawesome.com/icons?d=gallery&s=brands
  [[params.social]]
    name = "github"
    link = "https://github.com/thebinarybot"
  [[params.social]]
    name = "linkedin"
    link = "https://www.linkedin.com/in/nithinravi10/"
  [[params.social]]
    name = "email"
    link = "thebotsite@protonmail.com"  # no need for "mailto:" in the head
  [[params.social]]
    name = "twitter"
    link = "https://www.twitter.com/thebinarybot"
  [[params.social]]
    name = "instagram"
    link = "https://www.instagram.com/thebotgram"